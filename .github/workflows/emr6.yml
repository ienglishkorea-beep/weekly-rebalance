name: EMR-6 Weekly Rebalance

on:
  schedule:
    - cron: "0 23 * * 5"
  workflow_dispatch:

jobs:
  run-emr6:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance

      - name: Ensure data directories
        run: |
          mkdir -p data
          mkdir -p data/emr6_holdings_cache

      - name: Run EMR-6
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python emr6_main.py

      - name: Commit updated EMR-6 state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          test -f data/emr6_current_portfolio.json && git add data/emr6_current_portfolio.json || true
          test -f data/emr6_rebalance_log.csv && git add data/emr6_rebalance_log.csv || true
          test -f data/emr6_history.csv && git add data/emr6_history.csv || true
          git add data/emr6_holdings_cache/*.json || true

          git diff --cached --quiet || git commit -m "Update EMR-6 weekly rebalance state"
          git push
